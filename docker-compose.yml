secrets:
  # Create this file before first run:
  #   mkdir -p secrets && openssl rand -hex 32 > secrets/encryption_key && chmod 600 secrets/encryption_key
  # Never commit the secrets/ directory.
  encryption_key:
    file: ./secrets/encryption_key

services:
  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: bot-backend # Removed to allow scaling
    secrets:
      - encryption_key
    environment:
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      SETTINGS_FILE_PATH: /data/settings.enc
    dns:
      - 8.8.8.8
    networks:
      - intranet
      - dbnet
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - platform_data:/data   # Encrypted settings file shared across all backend replicas
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Load Balancer Gateway
  gateway:
    image: nginx:alpine
    container_name: bot-gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80" # Host 8000 -> Nginx 80 -> Backend 8000
    networks:
      - internet # Receives traffic
      - intranet # Forwards to backend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Discord Bot
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: bot-discord
    secrets:
      - encryption_key
    environment:
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      SETTINGS_FILE_PATH: /data/settings.enc
    volumes:
      - platform_data:/data   # Same encrypted settings as backend
    networks:
      - internet # For Discord API access
      - intranet # For backend API communication
      - dbnet    # For direct database access (postgres/redis on external dbnet)
    ports:
      - "8080:8080" # Health check endpoint
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Baseline Bot}
    container_name: bot-frontend
    networks:
      - internet # Public facing
      - intranet # For server-side backend API calls
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      INTERNAL_API_URL: http://backend:8000
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  internet:
    driver: bridge
    # Public-facing network (frontend, gateway)
  intranet:
    driver: bridge
    # Private communication: frontend ↔ backend, bot ↔ backend
  dbnet:
    external: true
    name: baseline_dbnet
    # Postgres and Redis run in the separate database stack (docker-compose.db.yml).
    # Start that stack first: docker compose -f docker-compose.db.yml up -d

volumes:
  platform_data:
    # Persists /data/settings.enc across container restarts.
    # Shared by all backend replicas.  Deleting this volume causes the
    # Setup Wizard to run again on next start.
