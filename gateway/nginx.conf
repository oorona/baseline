events {
    worker_connections 1024;
}

http {
    upstream backend_api {
        # Docker's internal DNS resolves 'backend' to all replica IPs
        server backend:8000;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=gemini_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    server {
        listen 80;
        
        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # CSP - Content Security Policy
        # -----------------------------------------------------------------------
        # DEVELOPMENT (current): Uses unsafe-inline/unsafe-eval to support
        # Next.js hot reload and React DevTools. DO NOT use this in production.
        #
        # PRODUCTION: Remove 'unsafe-inline' and 'unsafe-eval'. Use nonces or
        # hashes for inline scripts. Example production policy:
        #   script-src 'self' 'nonce-{NONCE}';
        #   style-src  'self' 'nonce-{NONCE}';
        # -----------------------------------------------------------------------
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:;" always;

        # Request limits
        client_max_body_size 10M;
        client_body_timeout 12;
        client_header_timeout 12;

        # Connection limit per IP
        limit_conn conn_limit 20;

        # Hide nginx version
        server_tokens off;

        # Default rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # =========================================================================
        # GEMINI API ENDPOINTS - Stricter rate limiting
        # These endpoints call external paid APIs - require authentication
        # Extended timeouts for slow operations (image segmentation, audio processing)
        # =========================================================================
        location ~ ^/api/v1/gemini/ {
            # Stricter rate limiting for Gemini endpoints (cost-sensitive)
            limit_req zone=gemini_limit burst=10 nodelay;
            
            # Extended timeouts for slow AI operations (segmentation can take 60-120s)
            proxy_connect_timeout 30s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
            send_timeout 180s;
            
            # Require valid session (enforced by backend, but we add defense-in-depth)
            # Block requests without authorization header or session cookie
            if ($http_authorization = "") {
                set $no_auth "1";
            }
            if ($cookie_session_id = "") {
                set $no_auth "${no_auth}1";
            }
            # Both empty = block (commented out to allow backend to return proper 401)
            # if ($no_auth = "11") {
            #     return 401;
            # }

            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Mark as internal gateway request
            proxy_set_header X-Gateway-Request "true";
        }

        # =========================================================================
        # LLM ENDPOINTS - Stricter rate limiting  
        # =========================================================================
        location ~ ^/api/v1/llm/ {
            limit_req zone=gemini_limit burst=10 nodelay;
            
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Gateway-Request "true";
        }

        # =========================================================================
        # AUTH ENDPOINTS - Very strict rate limiting to prevent brute force
        # =========================================================================
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Gateway-Request "true";
        }

        # =========================================================================
        # HEALTH CHECK - No rate limiting, public
        # =========================================================================
        location = /api/v1/health {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =========================================================================
        # ALL OTHER API ENDPOINTS
        # =========================================================================
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Gateway-Request "true";
        }
        
        # =========================================================================
        # DEFAULT - Proxy to backend
        # =========================================================================
        location / {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
