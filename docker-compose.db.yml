# Database infrastructure stack
# Start this ONCE before launching the application stack:
#   docker compose -f docker-compose.db.yml up -d
#
# The application stack (docker-compose.yml) connects to these services
# via the external 'dbnet' network.
#
# Prerequisites:
#   echo "your-superuser-password" > secrets/postgres_password.txt
#   chmod 600 secrets/postgres_password.txt

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

services:
  # PostgreSQL
  # Password authentication (scram-sha-256) is enforced for all connections.
  # The superuser password is read from secrets/postgres_password.txt via
  # POSTGRES_PASSWORD_FILE — the same file setup_database.sh reads at runtime.
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    secrets:
      - postgres_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql
    expose:
      - "5432"
    networks:
      - dbnet
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - dbnet
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  dbnet:
    external: true
    name: dbnet

volumes:
  postgres_data:
